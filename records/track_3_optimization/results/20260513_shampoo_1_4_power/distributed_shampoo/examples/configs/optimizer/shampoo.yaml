_target_: distributed_shampoo.DistributedShampoo
_partial_: true

lr: 0.001
betas: [0.9, 1.0]
beta3: -1.0
epsilon: 1e-12
weight_decay: 0.0
weight_decay_type: ${weight_decay_type:DECOUPLED}
max_preconditioner_dim: 1024
precondition_frequency: 100
start_preconditioning_step: -1
use_bias_correction: true

grafting_config:
  _target_: distributed_shampoo.AdamPreconditionerConfig
  beta2: 0.999
  epsilon: 1e-8

preconditioner_config:
  _target_: distributed_shampoo.RootInvShampooPreconditionerConfig
  amortized_computation_config:
    _target_: distributed_shampoo.preconditioner.matrix_functions_types.EigenConfig

iterate_averaging_config: null
